name: Build package (Filogic / MT7981B)

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:
    inputs:
      openwrt_version:
        description: 'OpenWrt version (e.g. 25.12.3, 24.10.6, SNAPSHOT)'
        required: true
        default: '25.12.3'
      target:
        description: 'Target (e.g. mediatek/filogic, x86/64)'
        required: true
        default: 'mediatek/filogic'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    env:
      OPENWRT_VERSION: ${{ github.event.inputs.openwrt_version || '25.12.3' }}
      TARGET:          ${{ github.event.inputs.target           || 'mediatek/filogic' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential ccache file gawk gettext \
            git libncurses5-dev libssl-dev python3 python3-distutils rsync \
            subversion unzip wget zlib1g-dev libelf-dev zstd

      - name: Resolve SDK URL
        id: sdk
        run: |
          set -e
          if [ "$OPENWRT_VERSION" = "SNAPSHOT" ]; then
            BASE="https://downloads.openwrt.org/snapshots/targets/${TARGET}"
          else
            BASE="https://downloads.openwrt.org/releases/${OPENWRT_VERSION}/targets/${TARGET}"
          fi
          echo "Base: $BASE"
          # SDK archive may be .tar.xz (older) or .tar.zst (25.12+)
          SDK_FILE=$(curl -fsSL "$BASE/" \
            | grep -oE 'openwrt-sdk[^"]+x86_64\.tar\.(xz|zst)' \
            | head -n1)
          if [ -z "$SDK_FILE" ]; then
            echo "::error::SDK archive not found at $BASE/"
            curl -fsSL "$BASE/" | grep -oE 'openwrt-sdk[^"]+' | head -5
            exit 1
          fi
          echo "SDK file: $SDK_FILE"
          echo "url=${BASE}/${SDK_FILE}" >> "$GITHUB_OUTPUT"
          echo "file=${SDK_FILE}"        >> "$GITHUB_OUTPUT"

      - name: Download SDK
        run: |
          wget -q "${{ steps.sdk.outputs.url }}" -O sdk.archive
          mkdir sdk
          case "${{ steps.sdk.outputs.file }}" in
            *.tar.zst) tar --zstd -xf sdk.archive -C sdk --strip-components=1 ;;
            *.tar.xz)  tar -xJf       sdk.archive -C sdk --strip-components=1 ;;
            *) echo "unknown archive format"; exit 1 ;;
          esac

      - name: Install feeds
        working-directory: sdk
        run: |
          cp feeds.conf.default feeds.conf
          echo "src-link olcrtc ${GITHUB_WORKSPACE}" >> feeds.conf
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          ./scripts/feeds install -a -p olcrtc

      - name: Configure
        working-directory: sdk
        run: |
          cat > .config <<EOF
          CONFIG_ALL_NONSHARED=n
          CONFIG_ALL=n
          CONFIG_AUTOREMOVE=n
          CONFIG_PACKAGE_olcrtc=m
          CONFIG_PACKAGE_olcrtc-tun2socks=m
          CONFIG_PACKAGE_luci-app-olcrtc=m
          CONFIG_PACKAGE_luci-i18n-olcrtc-ru=m
          CONFIG_PACKAGE_hev-socks5-tunnel=m
          EOF
          make defconfig

      - name: Build
        working-directory: sdk
        run: |
          make package/olcrtc/compile         V=s -j$(nproc) || make package/olcrtc/compile         V=s
          make package/olcrtc-tun2socks/compile V=s -j$(nproc) || make package/olcrtc-tun2socks/compile V=s
          make package/luci-app-olcrtc/compile  V=s -j$(nproc) || make package/luci-app-olcrtc/compile  V=s
          make package/luci-i18n-olcrtc-ru/compile V=s -j$(nproc) || true

      - name: Collect packages
        run: |
          mkdir -p artifacts
          # 25.12+ -> .apk, 24.10 and older -> .ipk
          find sdk/bin \( \
              -name 'olcrtc*.ipk'         -o -name 'olcrtc*.apk' -o \
              -name 'luci-app-olcrtc*.ipk' -o -name 'luci-app-olcrtc*.apk' -o \
              -name 'luci-i18n-olcrtc-*.ipk' -o -name 'luci-i18n-olcrtc-*.apk' \
            \) -exec cp {} artifacts/ \;
          ls -la artifacts/
          count=$(ls -1 artifacts/ 2>/dev/null | wc -l)
          echo "Collected $count package(s)"
          if [ "$count" -eq 0 ]; then
            echo "::error::No olcrtc packages produced. Check the Build step."
            echo "--- bin tree (debug) ---"
            find sdk/bin -maxdepth 6 -type d | head -30
            find sdk/bin -name '*.apk' -o -name '*.ipk' | grep -i olcrtc || true
            exit 1
          fi

      - name: Compute artifact name
        id: artname
        run: |
          # GitHub Actions artifact names cannot contain '/', use '-' instead
          safe_target="${TARGET//\//-}"
          echo "name=olcrtc-${OPENWRT_VERSION}-${safe_target}" >> "$GITHUB_OUTPUT"

      - name: Upload artifacts
        uses: actions/upload-artifact@v5
        with:
          name: ${{ steps.artname.outputs.name }}
          path: |
            artifacts/*.ipk
            artifacts/*.apk

      - name: Publish release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/*.ipk
            artifacts/*.apk
